[build]
  command = """
    git clone https://github.com/flutter/flutter.git --depth 1 -b stable $HOME/flutter &&
    export PATH="$HOME/flutter/bin:$PATH" &&
    flutter precache --web &&
    flutter build web --release \
      --dart-define=MAPBOX_TOKEN=$MAPBOX_TOKEN \
      --dart-define=MAPTILER_KEY=$MAPTILER_KEY \
      --dart-define=OPENROUTER_KEY=$OPENROUTER_KEY \
      --dart-define=GEMINI_KEY=$GEMINI_KEY \
      --dart-define=GOOGLE_MAPS_KEY=$GOOGLE_MAPS_KEY \
      --dart-define=HERE_API_KEY=$HERE_API_KEY \
      --dart-define=OPENCAGE_KEY=$OPENCAGE_KEY \
      --dart-define=W3W_KEY=$W3W_KEY
  """
  publish = "build/web"

[build.environment]
  FLUTTER_VERSION = "stable"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
