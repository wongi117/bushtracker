name: bush_track
description: "BushTrack - Offline GPS Survival and Mesh Communication App"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.4.9
  flutter_map: ^6.1.0
  latlong2: ^0.9.0
  maplibre_gl: ^0.26.0
  sensors_plus: ^3.0.0
  camera: ^0.11.0+1
  go_router: ^13.0.0
  path_provider: ^2.1.5
  path: ^1.8.3
  sqflite: ^2.3.0
  sqflite_common: ^2.5.4+1
  sqflite_common_ffi: ^2.3.2
  nearby_connections: ^4.3.0
  flutter_tts: ^4.2.5
  speech_to_text: ^7.3.0
  geolocator: ^14.0.2
  http: ^1.2.0
  flutter_gemma: ^0.0.4
  google_generative_ai: ^0.4.0
  url_launcher: ^6.2.0
  uuid: ^4.0.0
  
  # Photo geotagging
  image_picker: ^1.0.7
  image: ^4.1.3
  exif: ^3.3.0

  isar: ^3.1.0+1
  isar_flutter_libs: ^3.1.0+1
  fl_chart: any
  flutter_animate: ^4.5.2
  mesh_gradient: ^1.3.8
  simple_animations: ^5.2.0
  google_fonts: ^8.1.0
dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  build_runner: ^2.4.8
  isar_generator: ^3.1.0+1

flutter:
  uses-material-design: true
