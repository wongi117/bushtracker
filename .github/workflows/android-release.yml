name: Android — Build & Deploy to Play Store

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

jobs:
  build:
    name: Build Android AAB
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: 'stable'
          channel: stable
          cache: true

      - name: Get dependencies
        run: flutter pub get

      - name: Decode keystore
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 --decode > android/bushtrack-release.jks

      - name: Create key.properties
        run: |
          cat > android/key.properties <<EOF
          storePassword=${{ secrets.ANDROID_STORE_PASSWORD }}
          keyPassword=${{ secrets.ANDROID_KEY_PASSWORD }}
          keyAlias=${{ secrets.ANDROID_KEY_ALIAS }}
          storeFile=../bushtrack-release.jks
          EOF

      - name: Build App Bundle
        run: |
          flutter build appbundle --release \
            --dart-define=MAPBOX_TOKEN=${{ secrets.MAPBOX_TOKEN }} \
            --dart-define=MAPTILER_KEY=${{ secrets.MAPTILER_KEY }} \
            --dart-define=OPENROUTER_KEY=${{ secrets.OPENROUTER_KEY }} \
            --dart-define=GEMINI_KEY=${{ secrets.GEMINI_KEY }} \
            --dart-define=HERE_API_KEY=${{ secrets.HERE_API_KEY }} \
            --dart-define=OPENCAGE_KEY=${{ secrets.OPENCAGE_KEY }} \
            --dart-define=W3W_KEY=${{ secrets.W3W_KEY }} \
            --dart-define=BRAVE_KEY=${{ secrets.BRAVE_KEY }}

      - name: Upload AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: bushtrack-release.aab
          path: build/app/outputs/bundle/release/app-release.aab

      - name: Deploy to Play Store (Internal Track)
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJsonPlainText: ${{ secrets.GOOGLE_PLAY_SERVICE_ACCOUNT_JSON }}
          packageName: com.bushtrack.app
          releaseFiles: build/app/outputs/bundle/release/app-release.aab
          track: internal
          status: completed
