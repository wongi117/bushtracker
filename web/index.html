<!DOCTYPE html>
<html>
<head>
  <base href="$FLUTTER_BASE_HREF">
  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="AI-powered offline GPS, mesh comms and navigation for survey teams, rangers and remote workers in the WA outback.">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="BushTrack">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">
  <link rel="icon" type="image/png" href="favicon.png"/>
  <title>BushTracker — Offline Navigation for Remote Australia</title>
  <link rel="manifest" href="manifest.json">

  <!-- MapLibre GL JS — loaded DEFERRED so it never blocks Flutter init -->
  <script src="https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.js" defer></script>
  <link href="https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.css" rel="stylesheet" />

  <style>
    html, body { margin: 0; padding: 0; background: #0C0F1E; height: 100%; }
    #error-box { display:none; position:fixed; inset:0; background:#0C0F1E; color:#ff4444;
      font-family:monospace; padding:32px; font-size:13px; z-index:99999; overflow:auto; }
  </style>
</head>
<body>
  <div id="error-box"></div>

  <script>
    // Show a visible error if Flutter fails to start
    window.addEventListener('error', function(e) {
      var box = document.getElementById('error-box');
      if (box) {
        box.style.display = 'block';
        box.innerHTML += '<p>JS Error: ' + e.message + ' at ' + e.filename + ':' + e.lineno + '</p>';
      }
    });
  </script>

  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
